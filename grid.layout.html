<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>grid layout</title>
<style>
	@font-face {
		font-family: Georgia;
		src: url("Georgia Regular.ttf");
	} @font-face {
		font-family:Segoe;
		src: url("Segoe WP Bold.ttf");
	} body {
		background: whitesmoke;
	} #page {
		width: 1024px;
		height: 1348px;
		background: white;
		margin: 0 auto;
		border: 1px solid dimgray;
		box-shadow: 2px 3px 6px dimgray;
	} #banner {
		width: 100%;
	} h1 {
		text-align:center;
		font-family: Segoe, 'Segoe UI', 'DejaVu Sans', 'Trebuchet MS', Verdana, 'sans-serif';
		font-size: 36pt;
		font: 36/1.4em 'Segoe'
	} p {
		font: 14pt/1.4em Georgia;
		width: 768px; 
		margin: 12px auto;
		color: darkslategray; 
	} .text-img {
		width: 384px;
		float: left;
		margin: 0 24px 0 0;
		border: 1px solid darkgrey;
		box-shadow: 2px 3px 6px darkgrey;
	} .drop-cap {
		font-size:3em;
		float: left;
		line-height: 1.0em;
		margin: 0 0 -6px 0;
	} ul {
		width: 96.125%;
		height: 40px;
		background: darkkhaki;
		display: grid;
		grid-template: auto / repeat(7,auto);
	} li {
		height: 40px;
		text-align: center;
		font: 14pt/2.1em Georgia;
		list-style: none;
	} a {
		color: black;
		text-decoration: none;alignment-baseline: 
	} a li:hover {
		background: khaki;
	}
	body {
		background: whitesmoke;
	} #container {
		width: 500px;
		height: 500px;
		background: white;
		border: 1px solid dimgray;
		margin: 24px auto;
		display: grid;
		grid-template: auto auto/ auto auto;
	} #container div {
		font: 72pt/1.4em Georgia; 
	} #container div:nth-child(1) {
		background: url("bob.jpeg");
		background-repeat: no-repeat;
		background-size: cover;
		background-position: 0 -40px;
	} #container div:nth-child(2) {
	background:url(cipher-statue.jpeg);
		background-repeat: no-repeat;
		background-size: cover;
		
	} #container div:nth-child(3) {background:url("tinawsdc.c.jpeg");
		background-repeat: no-repeat;
		background-size: cover;
		grid-area: 2/1/3/3;
	} 
</style>
